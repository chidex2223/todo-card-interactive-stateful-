<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Task Card</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #0f172a, #1f2937);
  color: white;
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  width: 360px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

h2 {
  font-size: 20px;
  font-weight: bold;
}

.priority-indicator {
  width: 10px;
  height: 10px;
  display: inline-block;
  border-radius: 50%;
  margin-left: 5px;
}

.done {
  text-decoration: line-through;
  opacity: 0.6;
}

.overdue {
  color: #ef4444;
}

.in-progress {
  border-left: 4px solid #3b82f6;
}

button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  margin-top: 5px;
}

button:hover {
  opacity: 0.85;
}

select, input, textarea {
  width: 100%;
  margin-top: 5px;
  margin-bottom: 8px;
  padding: 5px;
  border-radius: 6px;
  border: none;
}
</style>
</head>

<body>

<article class="card" data-testid="test-todo-card">

  <input type="checkbox" id="complete" data-testid="test-todo-complete-toggle">

  <h2 data-testid="test-todo-title" id="title">
    Configure Secure Linux Server
  </h2>

  <button id="toggleBtn" data-testid="test-todo-expand-toggle">Expand</button>

  <div id="collapsible" data-testid="test-todo-collapsible-section" style="display:none;">
    <p data-testid="test-todo-description" id="desc">
      Install Nginx, configure firewall rules, and enable SSL for secure deployment.
    </p>
  </div>

  <p>
    Priority:
    <span id="priority" data-testid="test-todo-priority">High</span>
    <span id="indicator" class="priority-indicator" data-testid="test-todo-priority-indicator"></span>
  </p>

  <time id="dueDate" data-testid="test-todo-due-date"></time>

  <p id="timeRemaining" data-testid="test-todo-time-remaining"></p>
  <p id="overdue" data-testid="test-todo-overdue-indicator"></p>

  <p id="status" data-testid="test-todo-status">Pending</p>

  <select id="statusControl" data-testid="test-todo-status-control">
    <option>Pending</option>
    <option>In Progress</option>
    <option>Done</option>
  </select>

  <div data-testid="test-todo-tags">
    <span data-testid="test-todo-tag-devops">DevOps</span>
    <span data-testid="test-todo-tag-linux">Linux</span>
  </div>

  <button id="editBtn" data-testid="test-todo-edit-button">Edit</button>
  <button data-testid="test-todo-delete-button">Delete</button>

  <form id="editForm" data-testid="test-todo-edit-form" style="display:none;">
    <input id="editTitle" data-testid="test-todo-edit-title-input">
    <textarea id="editDesc" data-testid="test-todo-edit-description-input"></textarea>

    <select id="editPriority" data-testid="test-todo-edit-priority-select">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <input type="datetime-local" id="editDate" data-testid="test-todo-edit-due-date-input">

    <button type="button" id="saveBtn" data-testid="test-todo-save-button">Save</button>
    <button type="button" id="cancelBtn" data-testid="test-todo-cancel-button">Cancel</button>
  </form>

</article>

<script>

// INITIAL DUE DATE (2 hours ahead)
const due = new Date();
due.setHours(due.getHours() + 2);

// ELEMENTS
const checkbox = document.getElementById("complete");
const statusEl = document.getElementById("status");
const statusControl = document.getElementById("statusControl");
const titleEl = document.getElementById("title");
const descEl = document.getElementById("desc");
const priorityEl = document.getElementById("priority");
const indicator = document.getElementById("indicator");
const timeRemainingEl = document.getElementById("timeRemaining");
const overdueEl = document.getElementById("overdue");

// EDIT MODE
const editBtn = document.getElementById("editBtn");
const form = document.getElementById("editForm");
const editTitle = document.getElementById("editTitle");
const editDesc = document.getElementById("editDesc");
const editPriority = document.getElementById("editPriority");

editBtn.onclick = () => {
  form.style.display = "block";
  editTitle.value = titleEl.textContent;
  editDesc.value = descEl.textContent;
  editPriority.value = priorityEl.textContent;
};

saveBtn.onclick = () => {
  titleEl.textContent = editTitle.value;
  descEl.textContent = editDesc.value;
  priorityEl.textContent = editPriority.value;
  updatePriority();
  form.style.display = "none";
};

cancelBtn.onclick = () => {
  form.style.display = "none";
};

// STATUS LOGIC
statusControl.onchange = () => {
  statusEl.textContent = statusControl.value;

  document.querySelector(".card").classList.remove("in-progress");

  if (statusControl.value === "Done") {
    checkbox.checked = true;
    titleEl.classList.add("done");
  }

  if (statusControl.value === "In Progress") {
    document.querySelector(".card").classList.add("in-progress");
    checkbox.checked = false;
    titleEl.classList.remove("done");
  }

  if (statusControl.value === "Pending") {
    checkbox.checked = false;
    titleEl.classList.remove("done");
  }
};

checkbox.onchange = () => {
  if (checkbox.checked) {
    statusControl.value = "Done";
    statusEl.textContent = "Done";
    titleEl.classList.add("done");
  } else {
    statusControl.value = "Pending";
    statusEl.textContent = "Pending";
    titleEl.classList.remove("done");
  }
};

// PRIORITY COLOR
function updatePriority() {
  const p = priorityEl.textContent;
  indicator.style.background =
    p === "High" ? "#ef4444" :
    p === "Medium" ? "#f59e0b" : "#10b981";
}
updatePriority();

// EXPAND
const toggleBtn = document.getElementById("toggleBtn");
const section = document.getElementById("collapsible");
let expanded = false;

toggleBtn.onclick = () => {
  expanded = !expanded;
  section.style.display = expanded ? "block" : "none";
  toggleBtn.textContent = expanded ? "Collapse" : "Expand";
};

// TIME LOGIC
function updateTime() {
  if (checkbox.checked) {
    timeRemainingEl.textContent = "Completed";
    overdueEl.textContent = "";
    return;
  }

  const now = new Date();
  const diff = due - now;

  if (diff < 0) {
    overdueEl.textContent = "Overdue";
    overdueEl.classList.add("overdue");
    timeRemainingEl.textContent = "";
  } else {
    const hours = Math.floor(diff / (1000 * 60 * 60));
    const mins = Math.floor((diff % (1000 * 60 * 60)) / 60000);

    if (hours > 0) {
      timeRemainingEl.textContent = `Due in ${hours}h ${mins}m`;
    } else {
      timeRemainingEl.textContent = `Due in ${mins} minutes`;
    }

    overdueEl.textContent = "";
  }
}

setInterval(updateTime, 30000);
updateTime();

</script>

</body>
</html>
